<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZJ Portfolio</title>
    <style>
#lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

#lightbox-img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
}
</style>
<style>
:root {
    --bg: #0a0a0c;
    --card: rgba(255,255,255,0.04);
    --border: rgba(200,180,220,0.18);
    --text: #e6e3ea;
    --subtext: #9a96a3;
    --glow: rgba(180,160,200,0.25);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
}

.container {
    width: 90%;
    max-width: 1200px;
    margin: 0 auto;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: clamp(64px, 10vw, 140px);
    letter-spacing: 8px;
    font-weight: 700;
    text-shadow: 0 0 30px var(--glow);
}

.hero p {
    margin-top: 16px;
    color: var(--subtext);
    letter-spacing: 2px;
}

.hero .buttons {
    margin-top: 40px;
    display: flex;
    gap: 20px;
    justify-content: center;
}

.btn {
    padding: 10px 22px;
    border: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
    background: transparent;
    transition: all 0.3s ease;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 20px var(--glow);
}

/* ABOUT */
.section {
    padding: 100px 0;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 40px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

.card h2 {
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.card p {
    color: var(--subtext);
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 30px;
}

.work {
    background: var(--card);
    border: 1px solid var(--border);
    height: 260px;
    position: relative;
    overflow: hidden;
    transition: all 0.35s ease;
}

.work::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, var(--glow), transparent 70%);
    opacity: 0;
    transition: opacity 0.35s ease;
}

.work:hover {
    transform: translateY(-6px);
}

.work:hover::after {
    opacity: 1;
}

.work span {
    position: absolute;
    bottom: 16px;
    left: 16px;
    font-size: 14px;
    color: var(--subtext);
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 40px 0;
    color: var(--subtext);
    font-size: 12px;
}

@media (max-width: 600px) {
    .hero .buttons {
        flex-direction: column;
    }
}
</style>
</head>
<body>

<section class="hero">
    <div>
        <h1>ZJ</h1>
        <p>CYBERPUNK VISUAL ARTIST</p>
        <div class="buttons">
            <a href="#about" class="btn">ABOUT</a>
            <a href="#works" class="btn">WORKS</a>
        </div>
    </div>
</section>

<section id="about" class="section">
    <div class="container">
        <div class="card">
            <h2>ABOUT ME</h2>
            <p>
                电视剧电影侦探推理小说爱好者
                没事就喜欢瞎鼓捣
                所有作品全部AI展示
            </p>
        </div>
    </div>
</section>

<section id="works" class="section">
    <div class="container">
        <div class="gallery">
    <!-- 作品1 -->
    <div class="work" style="background: url('work1.jpg') center/cover no-repeat;background-size:contain;"
    onclick="openLightbox('work1.jpg')">
        <span>PROJECT 01</span>
    </div>
    <!-- 作品2 -->
    <div class="work" style="background: url('work2.png') center/cover no-repeat;background-size:contain"
    onclick="openLightbox('work2.png')">
        <span>PROJECT 02</span>
    </div>
    <!-- 作品3 -->
    <div class="work" style="background: url('work3.png') center/cover no-repeat;background-size:contain;"
    onclick="openLightbox('work3.png')">
        <span>PROJECT 03</span>
    </div>
    <!-- 作品4 -->
    <div class="work" style="background: url('work4.png') center/cover no-repeat;"
    onclick="openLightbox('work4.png')">
        <span>PROJECT 04</span>
    </div>
    <!-- 作品5 -->
    <div class="work" style="background: url('work5.png') center/cover no-repeat;background-size:contain"
    onclick="openLightbox('work5.png')">
        <span>PROJECT 05</span>
    </div>
    <!-- 作品6 -->
    <div class="work" style="background: url('work6.png') center/cover no-repeat;background-size:contain"
    onclick="openLightbox('work6.png')">
        <span>PROJECT 06</span>
        </div>
    </div>
</section>

<div class="footer">
    © ZJ
</div>

<script>
// minimal JS placeholder for extensibility
</script>
<!-- 灯箱HTML -->
<div id="lightbox" onclick="closeLightbox()">
    <span class="close-btn">&times;</span>
    <img id="lightbox-img" src="" alt="放大图片">
</div>

<!-- 灯箱JS（函数就在这里！） -->
<script>
function openLightbox(imgSrc) {
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    lightboxImg.src = imgSrc;
    lightbox.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    const lightbox = document.getElementById('lightbox');
    lightbox.style.display = 'none';
    document.body.style.overflow = '';
}
</script>

</body>
</html>
